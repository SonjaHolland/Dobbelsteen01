<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Animated Dice Roller</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #1e293b; /* Donkerblauwe/grijze moderne achtergrond */
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }

    h1 {
        margin-bottom: 2rem;
        font-weight: 600;
        font-size: 28px;
    }

    /* Het gebied waar de dobbelstenen rollen */
    .dice-area {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 3rem;
        min-height: 120px;
        perspective: 900px;
    }

    /* Jouw werkende 3D Cube instellingen */
    .dice {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.2s ease-out;
    }

    /* Strakke witte dobbelsteenvlakken met ronde hoeken */
    .face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: #ffffff;
        border: 2px solid #cbd5e1;
        border-radius: 12px;
        box-sizing: border-box;
    }

    /* De strakke ronde stippen */
    .pip {
        width: 16px;
        height: 16px;
        background: #0f172a; /* Donkere stipkleur */
        border-radius: 50%;
        position: absolute;
    }

    /* Exacte posities voor de stippen op het vlak */
    .tl { top: 16px; left: 16px; }
    .tr { top: 16px; right: 16px; }
    .bl { bottom: 16px; left: 16px; }
    .br { bottom: 16px; right: 16px; }
    .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ml { top: 50%; left: 16px; transform: translateY(-50%); }
    .mr { top: 50%; right: 16px; transform: translateY(-50%); }

    /* Jouw 3D rotaties om de kubus te bouwen */
    .front  { transform: rotateY(0deg) translateZ(50px); }
    .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg) translateZ(50px); }
    .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg) translateZ(50px); }
    .bottom { transform: rotateX(-90deg) translateZ(50px); }

    /* De controls en blauwe knoppen uit de mooie layout */
    .controls {
        display: flex;
        gap: 15px;
    }

    button {
        background-color: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: all 0.2s ease;
    }

    button:hover {
        background-color: #2563eb;
        transform: translateY(-2px);
    }

    button:active {
        transform: translateY(0);
    }
</style>
</head>

<body>

<h1>3D Dice Roller</h1>

<!-- Het dobbelsteengebied staat nu boven de knoppen -->
<div id="diceArea" class="dice-area"></div>

<!-- De twee aparte knoppen in plaats van het selectiemenu -->
<div class="controls">
    <button onclick="rollDice(1)">Roll 1 Dice</button>
    <button onclick="rollDice(2)">Roll 2 Dice</button>
</div>

<script>
function createFace(pips, cls) {
    const face = document.createElement("div");
    face.className = "face " + cls;

    pips.forEach(p => {
        const pip = document.createElement("div");
        pip.className = "pip " + p;
        face.appendChild(pip);
    });

    return face;
}

function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    const faces = [
        { cls: "front",  p: ["c"] },                         // 1
        { cls: "back",   p: ["tl","tr","ml","mr","bl","br"] }, // 6
        { cls: "right",  p: ["tl","c","br"] },               // 3
        { cls: "left",   p: ["tl","tr","bl","br"] },         // 4
        { cls: "top",    p: ["tl","tr","c","bl","br"] },     // 5
        { cls: "bottom", p: ["tl","br"] }                    // 2
    ];

    faces.forEach(f => dice.appendChild(createFace(f.p, f.cls)));

    return dice;
}

// Aangepast zodat hij het aantal (count) direct vanuit de geklikte knop doorkrijgt
function rollDice(count) {
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        const result = Math.floor(Math.random() * 6) + 1;

        const base = {
            1: {x: 0,   y: 0},
            2: {x: -90, y: 0},
            3: {x: 0,   y: 90},
            4: {x: 0,   y: -90},
            5: {x: 90,  y: 0},
            6: {x: 180, y: 0}
        };

        const extraX = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraY = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraZ = 360 * (Math.floor(Math.random() * 4) + 1);

        const finalX = base[result].x + extraX;
        const finalY = base[result].y + extraY;
        const finalZ = extraZ;

        setTimeout(() => {
            dice.style.transform =
                `rotateX(${finalX}deg) rotateY(${finalY}deg) rotateZ(${finalZ}deg)`;
        }, 50);
    }
}

// Laat alvast 1 dobbelsteen zien als de pagina voor het eerst laadt
window.onload = function() {
    rollDice(1);
};
</script>

</body>
</html>
