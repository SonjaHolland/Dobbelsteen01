<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Dice Roller</title>

<style>
    body {
        background: #1e293b; /* Jouw gewenste donkere achtergrond */
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
        color: white;
    }

    .dice-area {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 30px;
        perspective: 900px;
    }

    .dice {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.2s ease-out;
    }

    .face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: white;
        border: 3px solid #222;
        border-radius: 10px;
    }

    .pip {
        width: 18px;
        height: 18px;
        background: black; /* De zwarte stippen */
        border-radius: 50%;
        position: absolute;
    }

    .tl { top: 15px; left: 15px; }
    .tr { top: 15px; right: 15px; }
    .bl { bottom: 15px; left: 15px; }
    .br { bottom: 15px; right: 15px; }
    .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ml { top: 50%; left: 15px; transform: translateY(-50%); }
    .mr { top: 50%; right: 15px; transform: translateY(-50%); }

    .front  { transform: rotateY(0deg) translateZ(50px); }
    .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg) translateZ(50px); }
    .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg) translateZ(50px); }
    .bottom { transform: rotateX(-90deg) translateZ(50px); }

    /* Jouw knoppen-styling, alleen met de nieuwe blauwe kleuren */
    button {
        padding: 10px 18px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #3b82f6; /* Blauw */
        color: white;        /* Witte tekst */
        font-weight: bold;
        margin: 0 10px;      /* Ruimte tussen de twee knoppen */
    }
</style>
</head>

<body>

<h1>3D Dice Roller</h1>

<!-- De twee knoppen los naast elkaar, exact op de plek van jouw oude menu -->
<button onclick="rollDice(1)">Roll 1 Dice</button>
<button onclick="rollDice(2)">Roll 2 Dice</button>

<div id="diceArea" class="dice-area"></div>

<script>
function createFace(pips, cls) {
    const face = document.createElement("div");
    face.className = "face " + cls;

    pips.forEach(p => {
        const pip = document.createElement("div");
        pip.className = "pip " + p;
        face.appendChild(pip);
    });

    return face;
}

function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    const faces = [
        { cls: "front",  p: ["c"] },                         // 1
        { cls: "back",   p: ["tl","tr","ml","mr","bl","br"] }, // 6
        { cls: "right",  p: ["tl","c","br"] },               // 3
        { cls: "left",   p: ["tl","tr","bl","br"] },         // 4
        { cls: "top",    p: ["tl","tr","c","bl","br"] },     // 5
        { cls: "bottom", p: ["tl","br"] }                    // 2
    ];

    faces.forEach(f => dice.appendChild(createFace(f.p, f.cls)));

    return dice;
}

/* Accepteert nu direct het aantal (1 of 2) vanuit de knop */
function rollDice(count) {
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        const result = Math.floor(Math.random() * 6) + 1;

        const base = {
            1: {x: 0,   y: 0},
            2: {x: -90, y: 0},
            3: {x: 0,   y: 90},
            4: {x: 0,   y: -90},
            5: {x: 90,  y: 0},
            6: {x: 180, y: 0}
        };

        const extraX = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraY = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraZ = 360 * (Math.floor(Math.random() * 4) + 1);

        const finalX = base[result].x + extraX;
        const finalY = base[result].y + extraY;
        const finalZ = extraZ;

        setTimeout(() => {
            dice.style.transform =
                `rotateX(${finalX}deg) rotateY(${finalY}deg) rotateZ(${finalZ}deg)`;
        }, 50);
    }
}
</script>

</body>
</html>
