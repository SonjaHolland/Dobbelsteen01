<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Animated Dice Roller</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e293b;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 600;
        }

        /* Container where dice are rendered side-by-side */
        .dice-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            margin-bottom: 3rem;
        }

        /* 3D Scene setup */
        .dice-scene {
            width: 100px;
            height: 100px;
            perspective: 600px;
        }

        /* The actual 3D cube */
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        /* Styling every side of the dice */
        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 8px;
            box-sizing: border-box;
        }

        /* The dot style */
        .dot {
            display: block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #0f172a;
            justify-self: center;
            align-self: center;
        }

        /* 3D transforms to construct the box shape */
        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-6 { transform: rotateY(180deg) translateZ(50px); }
        .face-3 { transform: rotateY(90deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg) translateZ(50px); }
        .face-2 { transform: rotateX(-90deg) translateZ(50px); }

        /* CSS Grid positioning for dot layouts based on the face */
        /* Face 1 */
        .face-1 .dot { grid-area: 2 / 2; }
        
        /* Face 2 */
        .face-2 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-2 .dot:nth-child(2) { grid-area: 3 / 3; }
        
        /* Face 3 */
        .face-3 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-3 .dot:nth-child(2) { grid-area: 2 / 2; }
        .face-3 .dot:nth-child(3) { grid-area: 3 / 3; }
        
        /* Face 4 */
        .face-4 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-4 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-4 .dot:nth-child(3) { grid-area: 3 / 1; }
        .face-4 .dot:nth-child(4) { grid-area: 3 / 3; }
        
        /* Face 5 */
        .face-5 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-5 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-5 .dot:nth-child(3) { grid-area: 2 / 2; }
        .face-5 .dot:nth-child(4) { grid-area: 3 / 1; }
        .face-5 .dot:nth-child(5) { grid-area: 3 / 3; }
        
        /* Face 6 */
        .face-6 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-6 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-6 .dot:nth-child(3) { grid-area: 2 / 1; }
        .face-6 .dot:nth-child(4) { grid-area: 2 / 3; }
        .face-6 .dot:nth-child(5) { grid-area: 3 / 1; }
        .face-6 .dot:nth-child(6) { grid-area: 3 / 3; }

        /* Button styling */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>3D Dice Roller</h1>

    <!-- Container where the generated HTML dice elements land -->
    <div class="dice-container" id="diceContainer"></div>

    <div class="controls">
        <button onclick="rollDice(1)">Roll 1 Dice</button>
        <button onclick="rollDice(2)">Roll 2 Dice</button>
    </div>

    <script>
        // Mapping dice results to their concrete 3D rotations 
        const faceRotations = {
            1: { x: 0,   y: 0 },
            2: { x: 90,  y: 0 },
            3: { x: 0,   y: -90 },
            4: { x: 0,   y: 90 },
            5: { x: -90, y: 0 },
            6: { x: 0,   y: 180 }
        };

        // Standard HTML structural blueprint for a single 3D dice
        const diceHTML = `
            <div class="dice-scene">
                <div class="cube">
                    <div class="cube-face face-1"><span class="dot"></span></div>
                    <div class="cube-face face-2"><span class="dot"></span><span class="dot"></span></div>
                    <div class="cube-face face-3"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                    <div class="cube-face face-4"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                    <div class="cube-face face-5"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                    <div class="cube-face face-6"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                </div>
            </div>
        `;

        function rollDice(count) {
            const container = document.getElementById('diceContainer');
            container.innerHTML = ''; // Wipe out existing dice

            // Build the required amount of dice structures
            for (let i = 0; i < count; i++) {
                container.insertAdjacentHTML('beforeend', diceHTML);
            }

            // Let the browser paint the new structures, then apply animation frames
            setTimeout(() => {
                const cubes = container.querySelectorAll('.cube');
                
                cubes.forEach(cube => {
                    const result = Math.floor(Math.random() * 6) + 1;
                    const rotation = faceRotations[result];

                    // Adding extra random full spins (360 * X) to give a chaotic "tumble" look
                    const extraSpinsX = (Math.floor(Math.random() * 3) + 2) * 360; 
                    const extraSpinsY = (Math.floor(Math.random() * 3) + 2) * 360; 

                    const finalX = rotation.x + extraSpinsX;
                    const finalY = rotation.y + extraSpinsY;

                    cube.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;
                });
            }, 50);
        }

        // Run an initial single-die roll automatically when page mounts
        rollDice(1);
    </script>
</body>
</html>
