<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Utherverse Classic Dice Roller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e293b;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* Container voor de dobbelstenen naast elkaar */
        .dice-container {
            display: block;
            min-height: 120px;
            margin-bottom: 25px;
        }

        /* Klassieke 2D dobbelsteen die overal werkt */
        .classic-die {
            display: inline-block;
            width: 90px;
            height: 90px;
            background-color: #ffffff;
            color: #000000;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            margin: 0 15px;
            font-size: 50px;
            line-height: 90px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        .controls {
            margin-top: 20px;
        }

        /* Simpele knoppen zonder zware CSS3 effecten */
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <h1>Dobbelsteen Roller</h1>

    <div class="dice-container" id="diceContainer">
        <!-- Start met 1 dobbelsteen op het scherm -->
        <div class="classic-die">6</div>
    </div>

    <div class="controls">
        <button onclick="rollDice(1)">Roll 1 Dice</button>
        <button onclick="rollDice(2)">Roll 2 Dice</button>
    </div>

    <script>
        function rollDice(count) {
            const container = document.getElementById('diceContainer');
            container.innerHTML = ''; // Maak de container leeg

            // Maak direct het juiste aantal dobbelstenen aan
            const diceElements = [];
            for (let i = 0; i < count; i++) {
                const die = document.createElement('div');
                die.className = 'classic-die';
                die.innerHTML = '?';
                container.appendChild(die);
                diceElements.push(die);
            }

            // De "Roll" animatie: wisselt heel snel van getal (flits-effect)
            let lussen = 0;
            const maxLussen = 12; // Hoe vaak hij flitst voor hij stopt
            
            const interval = setInterval(function() {
                // Geef elke dobbelsteen een willekeurig tijdelijk getal
                for (let i = 0; i < diceElements.length; i++) {
                    diceElements[i].innerHTML = Math.floor(Math.random() * 6) + 1;
                }
                
                lussen++;
                
                // Als de animatie klaar is, stoppen we op het definitieve getal
                if (lussen >= maxLussen) {
                    clearInterval(interval);
                }
            }, 70); // Snelheid van het flitsen (70 milliseconden)
        }
    </script>
</body>
</html>
