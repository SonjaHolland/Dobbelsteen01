<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Utherverse Sign Dice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            margin: 0;
            overflow: hidden; /* Voorkomt lelijke scrollbalken op je sign */
        }

        h1 {
            font-size: 18px;
            margin: 5px 0 15px 0;
            color: #93c5fd;
        }

        .instruction {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .dice-container {
            display: block;
            margin-bottom: 15px;
        }

        /* Grote, makkelijk klikbare dobbelsteen voor in-world signs */
        .classic-die {
            display: inline-block;
            width: 100px;
            height: 100px;
            background-color: #ffffff;
            color: #000000;
            border-radius: 12px;
            border: 3px solid #3b82f6;
            margin: 0 10px;
            font-size: 55px;
            line-height: 100px;
            font-weight: bold;
            text-align: center;
            cursor: pointer; /* Zorgt dat de muisaanwijzer verandert in-world */
        }

        /* Extra duidelijke switch-knoppen onderaan die we via ID aansturen */
        .mode-btn {
            background-color: #374151;
            color: #f3f4f6;
            border: 1px solid #4b5563;
            padding: 8px 15px;
            font-size: 12px;
            border-radius: 4px;
            margin: 0 5px;
            cursor: pointer;
        }
        .mode-btn.active {
            background-color: #3b82f6;
            border-color: #2563eb;
        }
    </style>
</head>
<body>

    <h1>Dobbelsteen Roller</h1>
    <div class="instruction">Klik op een dobbelsteen om te rollen!</div>

    <!-- De dobbelstenen zelf zijn nu de knoppen -->
    <div class="dice-container" id="diceContainer"></div>

    <div>
        <span id="btn1" class="mode-btn active">Gebruik 1 Dobbelsteen</span>
        <span id="btn2" class="mode-btn">Gebruik 2 Dobbelstenen</span>
    </div>

    <script>
        let huidigeAantal = 1;
        let isRolling = false;

        // Luister naar de modus-knoppen via een veilige methode voor Utherverse
        document.getElementById('btn1').onmousedown = function() { changeMode(1); };
        document.getElementById('btn2').onmousedown = function() { changeMode(2); };

        function changeMode(aantal) {
            if (isRolling) return;
            huidigeAantal = aantal;
            document.getElementById('btn1').className = (aantal === 1) ? 'mode-btn active' : 'mode-btn';
            document.getElementById('btn2').className = (aantal === 2) ? 'mode-btn active' : 'mode-btn';
            setupDice();
        }

        function setupDice() {
            const container = document.getElementById('diceContainer');
            container.innerHTML = ''; 

            for (let i = 0; i < huidigeAantal; i++) {
                const die = document.createElement('div');
                die.className = 'classic-die';
                die.innerHTML = Math.floor(Math.random() * 6) + 1;
                
                // Muisklik-actie speciaal voor 3D signs (onmousedown werkt vaak beter dan onclick in vws clients)
                die.onmousedown = function() {
                    triggerRoll();
                };

                container.appendChild(die);
            }
        }

        function triggerRoll() {
            if (isRolling) return;
            isRolling = true;

            const diceElements = document.getElementsByClassName('classic-die');
            let lussen = 0;
            const maxLussen = 10;
            
            const interval = setInterval(function() {
                for (let i = 0; i < diceElements.length; i++) {
                    diceElements[i].innerHTML = Math.floor(Math.random() * 6) + 1;
                }
                lussen++;
                
                if (lussen >= maxLussen) {
                    clearInterval(interval);
                    isRolling = false;
                }
            }, 80);
        }

        // Start de eerste dobbelsteen op het scherm
        setupDice();
    </script>
</body>
</html>
